<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Stack Survival</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@400;700&family=Pretendard:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hud">
      <div class="hud-title-row">
        <div class="title-copy">
          <p class="app-kicker">BEST <strong id="bestScoreValue">0</strong></p>
          <h1 class="app-title">Block Stack</h1>
        </div>
        <div class="hud-actions">
          <button id="settingsButton" type="button" class="icon-btn settings-btn" aria-label="설정">&#9881;</button>
        </div>
      </div>
      <div class="hud-top-row">
        <div class="hud-chip score-chip">
          <span class="label">점수</span>
          <strong id="scoreValue">0</strong>
        </div>
        <div class="collapse-wrap">
          <div class="collapse-head">
            <span>남은 횟수</span>
            <strong id="collapseValue">15</strong>
          </div>
        </div>
      </div>
    </header>

    <section class="board-area">
      <div id="board" class="board" aria-label="6x6 game board"></div>
    </section>

    <section class="controls">
      <div class="controls-head">
        <div class="controls-copy">
          <span class="controls-kicker">NEXT BLOCK</span>
          <strong class="controls-title">다음 블럭</strong>
        </div>
        <button id="skipButton" type="button" class="skip-btn">SKIP</button>
      </div>
      <div id="currentBlockView" class="block-view"></div>
    </section>

    <div id="gameOverLayer" class="game-over-layer hidden">
      <div id="endingBoardFx" class="ending-board-fx" aria-hidden="true"></div>
      <div id="endingCard" class="ending-card hidden">
        <p class="ending-title">게임 종료</p>
        <p id="endingReason" class="ending-reason"></p>
        <p class="ending-score-label">달성 스코어</p>
        <strong id="endingScoreValue" class="ending-score">0</strong>
        <button id="endingContinueButton" type="button" class="ending-continue-btn">
          횟수 5회 추가하기
        </button>
        <button id="endingNewGameButton" type="button" class="ending-new-btn">새로하기</button>
      </div>
    </div>
  </main>

  <div class="danger-overlay" aria-hidden="true">
    <div class="danger-vignette"></div>
  </div>

  <div id="introModal" class="intro-modal" role="dialog" aria-modal="true" aria-labelledby="introTitle">
    <div class="intro-backdrop"></div>
    <section class="intro-panel">
      <div class="intro-panel-copy">
        <div class="intro-mascot" aria-hidden="true">
          <span class="intro-mascot-face">•ᴗ•</span>
        </div>
        <p class="intro-kicker">READY TO STACK</p>
        <h2 id="introTitle" class="intro-title">Block Stack</h2>
        <p class="intro-copy">6x6 보드 위에 블럭을 놓고 줄을 터뜨리며 최대한 오래 버티세요.</p>
      </div>
      <button id="introStartButton" type="button" class="intro-start-btn">시작하기</button>
    </section>
  </div>

  <div id="settingsModal" class="settings-modal hidden" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div id="settingsBackdrop" class="settings-backdrop"></div>
    <section class="settings-panel">
      <header class="settings-head">
        <h2 id="settingsTitle">설정</h2>
        <button id="settingsCloseButton" type="button" class="settings-close" aria-label="설정 닫기">닫기</button>
      </header>

      <section class="settings-section">
        <h3>사운드 설정</h3>
        <button id="soundSwitchButton" type="button" class="switch-btn">
          <span class="switch-label">효과음</span>
          <span class="switch-pill"><span class="switch-dot"></span></span>
          <strong id="soundSwitchState" class="switch-state">ON</strong>
        </button>
        <button id="bgmSwitchButton" type="button" class="switch-btn">
          <span class="switch-label">배경음악</span>
          <span class="switch-pill"><span class="switch-dot"></span></span>
          <strong id="bgmSwitchState" class="switch-state">ON</strong>
        </button>
      </section>

      <section class="settings-section">
        <div class="settings-section-head">
          <div>
            <h3>TTS 어드민</h3>
            <p class="settings-sub">큰 폭발 구간에서만 짧게 콜아웃하는 브라우저 내장 보이스입니다.</p>
          </div>
        </div>

        <button id="ttsSwitchButton" type="button" class="switch-btn">
          <span class="switch-label">보이스 TTS</span>
          <span class="switch-pill"><span class="switch-dot"></span></span>
          <strong id="ttsSwitchState" class="switch-state">ON</strong>
        </button>

        <div id="ttsAdminPanel" class="tts-admin-panel">
          <label class="tts-control" for="ttsThresholdInput">
            <span class="tts-control-top">
              <strong>발동 기준</strong>
              <span id="ttsThresholdValue" class="tts-value">14칸+</span>
            </span>
            <input id="ttsThresholdInput" type="range" min="8" max="24" step="1" />
          </label>

          <div class="tts-grid">
            <label class="tts-control" for="ttsRateInput">
              <span class="tts-control-top">
                <strong>속도</strong>
                <span id="ttsRateValue" class="tts-value">1.04x</span>
              </span>
              <input id="ttsRateInput" type="range" min="0.8" max="1.35" step="0.01" />
            </label>

            <label class="tts-control" for="ttsPitchInput">
              <span class="tts-control-top">
                <strong>톤</strong>
                <span id="ttsPitchValue" class="tts-value">1.18x</span>
              </span>
              <input id="ttsPitchInput" type="range" min="0.8" max="1.6" step="0.01" />
            </label>
          </div>

          <label class="tts-control" for="ttsVolumeInput">
            <span class="tts-control-top">
              <strong>볼륨</strong>
              <span id="ttsVolumeValue" class="tts-value">0.96x</span>
            </span>
            <input id="ttsVolumeInput" type="range" min="0.4" max="1" step="0.01" />
          </label>

          <div class="tts-phrase-grid">
            <label class="tts-text-field" for="ttsPhraseGoodInput">
              <span>기본 폭발</span>
              <input id="ttsPhraseGoodInput" type="text" maxlength="18" placeholder="굿!!" />
            </label>
            <label class="tts-text-field" for="ttsPhraseGreatInput">
              <span>강한 연쇄</span>
              <input id="ttsPhraseGreatInput" type="text" maxlength="18" placeholder="나이스!!" />
            </label>
            <label class="tts-text-field" for="ttsPhraseMegaInput">
              <span>메가 버스트</span>
              <input id="ttsPhraseMegaInput" type="text" maxlength="18" placeholder="와우!!" />
            </label>
            <label class="tts-text-field" for="ttsPhraseAllClearInput">
              <span>올클리어</span>
              <input id="ttsPhraseAllClearInput" type="text" maxlength="18" placeholder="올 클리어!!" />
            </label>
          </div>

          <div class="tts-test-row">
            <button id="ttsTestGoodButton" type="button" class="tts-test-btn">굿 테스트</button>
            <button id="ttsTestMegaButton" type="button" class="tts-test-btn">메가 테스트</button>
            <button id="ttsTestAllClearButton" type="button" class="tts-test-btn accent">올클리어</button>
          </div>

          <p id="ttsAdminHint" class="settings-sub">효과음이 꺼져 있으면 TTS도 같이 멈춥니다.</p>
        </div>
      </section>
    </section>
  </div>

  <div id="adWatchModal" class="ad-watch-modal hidden" role="dialog" aria-modal="true" aria-labelledby="adWatchTitle">
    <div class="settings-backdrop"></div>
    <section class="ad-watch-panel">
      <h2 id="adWatchTitle">광고 준비 중</h2>
      <div class="ad-skeleton-frame" aria-hidden="true">
        <span class="ad-skeleton-block is-video"></span>
        <span class="ad-skeleton-block is-title"></span>
        <span class="ad-skeleton-block is-copy"></span>
        <span class="ad-skeleton-block is-copy short"></span>
      </div>
      <p id="adWatchStatus" class="ad-watch-status">광고를 불러오고 있습니다...</p>
      <div class="ad-watch-progress" aria-hidden="true">
        <span id="adWatchProgressFill"></span>
      </div>
    </section>
  </div>

  <script src="./game.js"></script>
</body>
</html>
